<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Sikkim Bible College</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --primary: #1E3A8A; --gold: #D4AF37; }
        body { font-family: 'Inter', sans-serif; }
        .heading-font { font-family: 'Playfair Display', serif; }
        .nav-scrolled { background: white !important; color: #1E3A8A !important; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .input-field { @apply w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-900 transition-all; }
    </style>
</head>
<body class="bg-slate-50 overflow-x-hidden">

    <div id="header-container"></div>

    <header class="relative h-[40vh] mt-16 md:mt-24 flex items-center justify-center text-center text-white overflow-hidden">
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-[#1E3A8A]/80 z-10"></div>
            <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80" class="w-full h-full object-cover" alt="Office">
        </div>
        <div class="relative z-20 px-4" data-aos="fade-up">
            <h1 class="heading-font text-5xl md:text-6xl mb-2">Get In Touch</h1>
            <p class="text-white uppercase tracking-widest font-bold text-sm">We are here to answer your questions</p>
        </div>
    </header>

    <main class="py-24 max-w-7xl mx-auto px-6">
        <div class="grid lg:grid-cols-2 gap-16">
            
            <div class="bg-white p-10 rounded-3xl shadow-xl border border-slate-100" data-aos="fade-right">
                <h2 class="heading-font text-3xl text-blue-900 mb-8">Send a Message</h2>
                <form action="#" class="space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Full Name</label>
                            <input type="text" placeholder="Suneel Bohara" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-900 transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Email Address</label>
                            <input type="email" placeholder="Suneel@example.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-900 transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Subject</label>
                        <select class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-900 transition-all">
                            <option>General Inquiry</option>
                            <option>Admission Question</option>
                             <option>Donation & Support</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Message</label>
                        <textarea rows="5" placeholder="How can we help you?" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-900 transition-all"></textarea>
                    </div>
                    <button class="w-full bg-blue-900 text-white font-bold py-4 rounded-lg hover:text-[#e1302e] hover:text-blue-900 transition-all shadow-lg">Send Inquiry</button>
                </form>
            </div>

            <div class="space-y-12" data-aos="fade-left">
                <div>
                    <h2 class="heading-font text-3xl text-blue-900 mb-8">Campus Information</h2>
                    <div class="space-y-6">
                        <div class="flex gap-6">
                            <div class="w-12 h-12 text-[#e1302e]/10 rounded-full flex items-center justify-center text-[#e1302e] shrink-0">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            </div>
                            <div>
                                <h4 class="font-bold text-blue-900">Our Location</h4>
                                <p class="text-gray-500 text-sm">Lower Dochum (Singtam Sirwani), Gangtok District Sikkim</p>
                                <p class="text-gray-500 text-sm">737135</p>
                            </div>
                        </div>
                        <div class="flex gap-6">
                            <div class="w-12 h-12 text-[#e1302e]/10 rounded-full flex items-center justify-center text-[#e1302e] shrink-0">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                            </div>
                            <div>
                                <h4 class="font-bold text-blue-900">Phone & Email</h4>
                                <p class="text-gray-500 text-sm">+91 63956 08483<br>info@sikkimbiblecollege.com</p>
                            </div>
                        </div>
                    </div>
                </div>

                
                <div class="bg-white p-2 md:p-8 rounded-[2.5rem] shadow-2xl border border-gray-100 group transition-all duration-500 hover:shadow-[#e1302e]/10 max-w-4xl mx-auto">
    
                <div class="relative w-full overflow-hidden rounded-[2rem] h-[450px] bg-zinc-100 border border-gray-200 shadow-inner">                                      
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3547.052622967754!2d88.47907790000001!3d27.248878899999998!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39e6a1fc89702b17%3A0xfac80063a41adfca!2sNaya%20Drishti%20Ministries!5e0!3m2!1sen!2snp!4v1772103904762!5m2!1sen!2snp" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>                                      
                </div>
            </div>
                
            </div>

        </div>
    </main>

    <footer class="bg-blue-900 text-white py-12 text-center text-sm">
        <p>© 2026 Sikkim Bible College. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="script.js"></script>
</body>
</html>
