<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literature & Resources | Sikkim Bible College</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --primary: #1E3A8A; --gold: #D4AF37; }
        body { font-family: 'Inter', sans-serif; }
        .heading-font { font-family: 'Playfair Display', serif; }
        .lit-card:hover img { transform: scale(1.05); filter: grayscale(0); }
        .lit-card img { transition: all 0.5s ease; filter: grayscale(100%); }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body class="bg-slate-50 overflow-x-hidden">

    <div id="header-container"></div>

    <header class="relative h-[40vh] mt-16 md:mt-24 flex items-center justify-center text-center text-white overflow-hidden">
        <div class="absolute inset-0 z-0">
            <div class="absolute inset-0 bg-[#1E3A8A]/80 z-10"></div>
            <img src="https://images.unsplash.com/photo-1507738911741-383f12629610?auto=format&fit=crop&q=80" class="w-full h-full object-cover" alt="Library">
        </div>
        <div class="relative z-20 px-4" data-aos="fade-up">
            <h1 class="heading-font text-5xl md:text-7xl mb-4 text-white">College Literature</h1>
            <p class="text-white uppercase tracking-widest font-bold text-sm">Scholarly Works & Biblical Resources</p>
        </div>
    </header>

    <section class="py-24 max-w-7xl mx-auto px-6">
        <div class="grid md:grid-cols-3 gap-12 lg:gap-16">
            
            <div class="lit-card group text-center" data-aos="fade-up">
                <div class="relative rounded-2xl overflow-hidden shadow-2xl border-8 border-white mb-6">
                    <img src="/assets/img/Journal Cover/STJ-V01.jpg" class="w-full h-[400px] object-cover" alt="STJ Vol 1">
                </div>
                <h3 class="heading-font text-2xl text-blue-900 mb-2">Sikkim Theological Journal - V1</h3>
                <div class="flex gap-4 mt-6">
                    <button onclick="checkAccess('SBC Journal V1')" class="flex-1 py-3 border-2 border-blue-900 text-blue-900 font-bold text-xs uppercase hover:bg-blue-900 hover:text-white transition">Read PDF</button>
                    <a href="purchase.html?item=SBC Journal V1" class="px-6 py-3 bg-[#e1302e] text-white font-bold text-xs uppercase hover:bg-black transition">Buy</a>
                </div>
            </div>

            <div class="lit-card group text-center" data-aos="fade-up" data-aos-delay="100">
                <div class="relative rounded-2xl overflow-hidden shadow-2xl border-8 border-white mb-6">
                    <img src="/assets/img/Journal Cover/STJ-V02.jpg" class="w-full h-[400px] object-cover" alt="Sikkim Theological Journal - V2">
                </div>
                <h3 class="heading-font text-2xl text-blue-900 mb-2">Sikkim Theological Journal - V2</h3>
                <div class="flex gap-4 mt-6">
                    <button onclick="checkAccess('Sikkim Theological Journal - V2')" class="flex-1 py-3 border-2 border-blue-900 text-blue-900 font-bold text-xs uppercase hover:bg-blue-900 hover:text-white transition">Read PDF</button>
                    <a href="purchase.html?item=Sikkim Theological Journal - V2" class="px-6 py-3 bg-[#e1302e] text-white font-bold text-xs uppercase hover:bg-black transition">Buy</a>
                </div>
            </div>

            <div class="lit-card group text-center" data-aos="fade-up" data-aos-delay="100">
                <div class="relative rounded-2xl overflow-hidden shadow-2xl border-8 border-white mb-6">
                    <img src="/assets/img/Journal Cover/The Shadow Grace.jpg" class="w-full h-[400px] object-cover" alt="The Shadow of Grace">
                </div>
                <h3 class="heading-font text-2xl text-blue-900 mb-2">The Shadow of Grace</h3>
                <div class="flex gap-4 mt-6">
                    <button onclick="checkAccess('The Shadow of Grace')" class="flex-1 py-3 border-2 border-blue-900 text-blue-900 font-bold text-xs uppercase hover:bg-blue-900 hover:text-white transition">Read PDF</button>
                    <a href="purchase.html?item=The Shadow of Grace" class="px-6 py-3 bg-[#e1302e] text-white font-bold text-xs uppercase hover:bg-black transition">Buy</a>
                </div>
            </div>

        </div>
    </section>

    <div id="password-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-md rounded-2xl overflow-hidden shadow-2xl border-t-8 border-[#e1302e]">
            <div class="p-8">
                <h3 class="heading-font text-3xl text-blue-900 mb-2">Access Protected</h3>
                <p class="text-gray-500 text-sm mb-6">Enter the access key provided with your purchase.</p>
                
                <input type="password" id="modal-password-input" 
                       class="w-full px-4 py-4 bg-slate-100 border-2 border-transparent focus:border-[#e1302e] outline-none rounded-xl mb-4 text-center text-xl tracking-widest" 
                       placeholder="••••••••">
                
                <button onclick="submitPassword()" class="w-full bg-[#e1302e] text-white py-4 rounded-xl font-bold uppercase hover:bg-black transition-all">Verify Access</button>
                <button onclick="closeModal()" class="w-full py-3 text-gray-400 text-xs uppercase font-bold hover:text-black mt-2">Cancel</button>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/literature-logic.js"></script>
</body>
</html>
